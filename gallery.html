<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gallery</title>

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond&display=swap" rel="stylesheet">
</head>

<body>

<div class="cursor"></div>

<!-- COVER -->
<div class="cover">
  <div class="text">
    <div class="name">Ann Vavasseur</div>
    <div class="subtitle">Le Présent</div>
  </div>
</div>

<!-- GALLERY -->
<section class="gallery">
  <img src="https://images.unsplash.com/photo-1526481280695-3c687fd5432c" alt="">
  <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee" alt="">
  <img src="https://images.unsplash.com/photo-1526481280695-3c687fd5432c" alt="">
  <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee" alt="">
</section>

<!-- JAVASCRIPT -->
<script>
/* CURSOR */
const cursor = document.querySelector(".cursor");

document.addEventListener("mousemove", (e) => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});

/* SCROLL REVEAL */
const images = document.querySelectorAll(".gallery img");

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add("is-visible");
    }
  });
}, {
  threshold: 0.15
});

images.forEach(img => observer.observe(img));
</script>

</body>
</html>
