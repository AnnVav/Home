<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gallery</title>

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond&display=swap" rel="stylesheet">
</head>

<body>

<div class="cursor"></div>

<!-- COVER -->
<div class="cover">
  <div class="text">
    <div class="name">Ann Vavasseur</div>
    <div class="subtitle">Le Présent</div>
  </div>
</div>

<!-- GALLERY -->
<section class="gallery">
    <img src="images/annick-vavasseur-paysage-interieur-I-2016.jpg" alt="Annick Vavasseur artwork 1">
    <img src="images/annick-vavasseur-back-home-2025.jpg" alt="Annick Vavasseur artwork 2">
    <img src="images/annick-vavasseur-l-ile-aux-dragons-2017.jpg" alt="Annick Vavasseur artwork 3">
    <img src="images/annick-vavasseur-de-l-autre-cote-2025.jpg" alt="Annick Vavasseur artwork 4">
    <img src="images/annick-vavasseur-la-maree-2022.jpg" alt="Annick Vavasseur artwork 5">
    <img src="images/annick-vavasseur-l-ailleurs-ici-2022.jpg" alt="Annick Vavasseur artwork 6">
</section>

<!-- JAVASCRIPT -->
<script>
/* CURSOR */
const cursor = document.querySelector(".cursor");

document.addEventListener("mousemove", (e) => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});

/* SCROLL REVEAL */
const images = document.querySelectorAll(".gallery img");

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add("is-visible");
    }
  });
}, {
  threshold: 0.15
});

images.forEach(img => observer.observe(img));
</script>

</body>
</html>
