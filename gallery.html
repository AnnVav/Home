<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <title>Gallery</title>
</head>

<body>

<!-- CURSOR -->
<div class="cursor"></div>

<!-- COVER -->
<div class="cover"></div>

<!-- GALLERY -->
<section class="gallery">

  <div class="artwork i1">

  <img src="images/annick-vavasseur-paysage-interieur-I-2016.jpg">

  <div class="title">
    Paysage intérieur I (2016)
  </div>

  <div class="meta">
    Acrylic on canvas
  </div>

</div>
  <div class="artwork i2">

  <img src="images/annick-vavasseur-back-home-2025.jpg">

  <div class="title">
    Back Home (2025)
  </div>

  <div class="meta">
    Acrylic on canvas
  </div>

</div>
  <div class="artwork i3">

  <img src="images/annick-vavasseur-l-ile-aux-dragons-2017.jpg">

  <div class="title">
    L’Île aux Dragons (2017)
  </div>

  <div class="meta">
    Acrylic on canvas
  </div>

</div>
  <div class="artwork i4">

  <img src="images/annick-vavasseur-de-l-autre-cote-2025.jpg">

  <div class="title">
    De l’autre côté (2025)
  </div>

  <div class="meta">
    Acrylic on canvas
  </div>

</div>
  <div class="artwork i5">

  <img src="images/annick-vavasseur-la-maree-2022.jpg">

  <div class="title">
    La Marée (2022)
  </div>

  <div class="meta">
    Acrylic on canvas
  </div>

</div>
  <div class="artwork i6">

  <img src="images/annick-vavasseur-l-ailleurs-ici-2022.jpg">

  <div class="title">
    L’Ailleurs ici (2022)
  </div>

  <div class="meta">
    Acrylic on canvas
  </div>

</div>

</section>

<!-- JS PROPRE -->
<script>
document.addEventListener("DOMContentLoaded", () => {

  console.log("JS OK");

  /* CURSOR */
  const cursor = document.querySelector(".cursor");

  document.addEventListener("mousemove", (e) => {
    cursor.style.left = e.clientX + "px";
    cursor.style.top = e.clientY + "px";
  });

  /* IMAGE REVEAL */
 document.addEventListener("DOMContentLoaded", () => {

  const artworks = document.querySelectorAll(".artwork");

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add("is-visible");
      }
    });
  }, {
    threshold: 0.1
  });
  artworks.forEach(art => observer.observe(art));
});
  
</script>
<script>
document.addEventListener("contextmenu", (e) => {
  if (e.target.tagName === "IMG") {
    e.preventDefault();
  }
});

document.addEventListener("dragstart", (e) => {
  if (e.target.tagName === "IMG") {
    e.preventDefault();
  }
});
</script>
</body>
</html>
