  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
</head>

<body>

<nav class="main-nav">

  <!-- CURSOR (optional) -->
  <div class="cursor"></div>

  <!-- HERO / FIRST VIEW -->
 <section class="hero">

  <img class="hero-image" src="annick-vavasseur-le-present-2022-cover.jpg" alt="Artwork">

  <h1 class="artist-name">
    Annick<br>Vavasseur
  </h1>

</section>

  <!-- GALLERY -->
  <section class="gallery">

    <div class="artwork center">
      <img src="images/annick-vavasseur-paysage-interieur-I-2016.jpg" alt="Annick Vavasseur artwork 1">
      <div class="title">Paysage-Interieur-I</div>
    </div>
<div class="gallery">

    <div class="artwork right">
      <img src="images/annick-vavasseur-back-home-2025.jpg" alt="Annick Vavasseur artwork 2">
      <div class="title">Back Home</div>
    </div>

    <div class="artwork left">
      <img src="images/annick-vavasseur-l-ile-aux-dragons-2017.jpg" alt="Annick Vavasseur artwork 3">
      <div class="title">L ile aux Dragons</div>

      <div class="title">De l autre cote</div>
    </div>

    </div>

  </section>

 <script>
/* =========================
   CURSOR (1 seule version)
========================= */
const cursor = document.querySelector(".cursor");

document.addEventListener("mousemove", (e) => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});


/* =========================
   APPARITION AU SCROLL
========================= */

const artworks = document.querySelectorAll(".artwork");

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add("visible");
    }
  });
}, {
  threshold: 0.3
});

artworks.forEach(art => {
  observer.observe(art);
});
</script>
</body>
