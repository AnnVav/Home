<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Annick Vavasseur | French Contemporary Painter</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
</head>

<body>

<!-- MENU -->
<nav class="main-nav">
  <a href="gallery.html">Portfolio</a>
  <a href="biography.html">Biography</a>
  <a href="exhibitions.html">Exhibitions</a>
  <a href="contact.html">Contact</a>
</nav>

<!-- CURSOR -->
<div class="cursor">
  <span></span>
  <span></span>
  <span></span>
</div>

<!-- HERO -->
<section class="hero">

  <img class="hero-image" src="annick-vavasseur-le-present-2022-cover.jpg" alt="Artwork">

  <h1 class="artist-name">
    Annick<br>Vavasseur
  </h1>

</section>

<!-- GALLERY -->
<section class="gallery">

  <div class="artwork center">
    <img src="images/annick-vavasseur-paysage-interieur-I-2016.jpg" alt="">
    <div class="title">Paysage intérieur I (2016)</div>
    <div class="meta">Acrylic on canvas</div>
  </div>

  <div class="artwork center">
    <img src="images/annick-vavasseur-back-home-2025.jpg" alt="">
    <div class="title">Back Home (2025)</div>
    <div class="meta">Acrylic on canvas</div>
  </div>

  <div class="artwork center">
    <img src="images/annick-vavasseur-l-ile-aux-dragons-2017.jpg" alt="">
    <div class="title">L’île aux Dragons (2017)</div>
    <div class="meta">Acrylic on canvas</div>
  </div>

  <div class="artwork center">
    <img src="images/annick-vavasseur-de-l-autre-cote-2025.jpg" alt="">
    <div class="title">De l’autre côté (2025)</div>
    <div class="meta">Acrylic on canvas</div>
  </div>

  <div class="artwork center">
    <img src="images/annick-vavasseur-la-maree-2022.jpg" alt="">
    <div class="title">La Marée (2022)</div>
    <div class="meta">Acrylic on canvas</div>
  </div>

  <div class="artwork center">
    <img src="images/annick-vavasseur-l-ailleurs-ici-2022.jpg" alt="">
    <div class="title">L’Ailleurs ici (2022)</div>
    <div class="meta">Acrylic on canvas</div>
  </div>

</section>

<!-- JS -->
<script>

/* MENU scroll */
const nav = document.querySelector(".main-nav");

window.addEventListener("scroll", () => {
  if (window.scrollY > window.innerHeight * 0.9) {
    nav.classList.add("visible");
  } else {
    nav.classList.remove("visible");
  }
});

/* CURSOR */
const cursor = document.querySelector(".cursor");

document.addEventListener("mousemove", (e) => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});

/* SCROLL ANIMATION */
const artworks = document.querySelectorAll(".artwork");

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add("visible");
    }
  });
}, {
  threshold: 0.05,
  rootMargin: "0px 0px -10% 0px"
});

artworks.forEach(art => {
  observer.observe(art);
});

</script>

</body>
</html>
